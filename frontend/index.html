<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MIET Student Assistant</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="page">
		<section class="hero">
			<div>
				<p class="eyebrow">MIET Jammu</p>
				<h1>Student Assistant Chatbot</h1>
				<p class="lede">Ask about admissions, courses, fees, campus life, or anything else you need to know.</p>
			</div>
		</section>

		<section class="chat-card">
			<form id="chat-form">
				<label for="question">Your question</label>
				<div class="input-row">
					<input type="text" id="question" name="question" placeholder="e.g., What are the admission requirements?" required minlength="3" />
					<button type="submit" id="ask-btn">Ask</button>
				</div>
			</form>
			<div id="status" aria-live="polite"></div>
			<article id="answer" class="answer"></article>
		</section>
	</main>

	<script src="app.js" defer></script>
</body>
</html>
