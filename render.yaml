services:
  - type: web
    name: student-assistant-chatbot
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: PORT
        value: 10000
      - key: PROJECT_ROOT
        value: /app
